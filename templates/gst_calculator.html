{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>GST Calculator</h1>
  <p class="sub">Calculate GST instantly with CGST and SGST split.</p>

  <div class="form-grid">
    <label for="amount">Amount</label>
    <input id="amount" type="number" min="0" step="0.01" placeholder="Enter amount">

    <label for="gstRate">GST Rate</label>
    <select id="gstRate">
      <option value="5">5%</option>
      <option value="12">12%</option>
      <option value="18" selected>18%</option>
      <option value="28">28%</option>
    </select>
  </div>

  <div class="toggle-row">
    <label><input type="radio" name="mode" value="add" checked> Add GST</label>
    <label><input type="radio" name="mode" value="remove"> Remove GST</label>
  </div>

  <hr>

  <div class="result-grid">
    <div><span>CGST</span><strong id="cgst">INR 0.00</strong></div>
    <div><span>SGST</span><strong id="sgst">INR 0.00</strong></div>
    <div><span>Total</span><strong class="highlight" id="total">INR 0.00</strong></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/gst.js') }}"></script>
{% endblock %}
