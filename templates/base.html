<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="robots" content="index, follow">
  <title>{{ page_title }} | FreeBizTools India</title>
  <meta name="description" content="{{ page_description or 'Free business tools for India: GST calculator, invoice generator with PDF, reverse GST calculator, and discount calculator.' }}">
  <link rel="canonical" href="{{ canonical_url or request.url }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  {% block seo %}{% if structured_data %}
  <script type="application/ld+json">
  {{ structured_data | tojson | safe }}
  </script>
  {% endif %}{% endblock %}
  <!-- Google AdSense script – copy this between <head> tags on every page -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ adsense_client or 'ca-pub-4803874079186263' }}" crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="{{ url_for('gst_calculator') }}">FreeBizTools India</a>
      <nav class="nav-links" aria-label="Main">
        <a href="{{ url_for('gst_calculator') }}">GST Calculator</a>
        <a href="{{ url_for('invoice_generator') }}">Invoice Generator</a>
        <a href="{{ url_for('reverse_gst_calculator') }}">Reverse GST</a>
        <a href="{{ url_for('discount_calculator') }}">Discount</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <!-- header banner ad unit (responsive placeholder) -->
    <div class="ad-slot ad-banner" aria-label="Advertisement">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="{{ adsense_client or 'ca-pub-XXXXXXXXXXXXXXXX' }}"
           data-ad-slot="1234567890"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>

  <main class="container layout">
    <section class="main-content">
      {% block content %}{% endblock %}
    </section>
    <aside class="sidebar-ad" aria-label="Sidebar advertisement">
      <!-- sidebar ad unit placeholder -->
      <div class="ad-slot">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="{{ adsense_client or 'ca-pub-XXXXXXXXXXXXXXXX' }}"
             data-ad-slot="0987654321"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="container">FreeBizTools India</div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
